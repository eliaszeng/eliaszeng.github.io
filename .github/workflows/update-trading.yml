name: Update Trading Charts

on:
  workflow_dispatch:

jobs:
  update-charts:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/trading/requirements.txt

      - name: Generate K-line charts
        run: python scripts/trading/generate_charts.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/trading/
          git diff --staged --quiet || git commit -m "update: trading charts $(date +%Y-%m-%d)"
          git push
