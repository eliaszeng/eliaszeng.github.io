name: Generate Trading Charts

on:
  schedule:
    # 每天北京时间 18:00 (UTC 10:00) 运行
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-charts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/trading/requirements.txt

      - name: Generate K-line charts
        run: python scripts/trading/generate_charts.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/trading/charts/
          if git diff --cached --quiet; then
            echo "No new charts to commit"
          else
            git commit -m "chore: update trading K-line charts [skip ci]"
            git push
          fi
